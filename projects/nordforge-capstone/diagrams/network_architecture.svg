<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NordForge network architecture — current state at end of Stage 4</title>
<desc>OPNsense firewall with four VLANs. CORP holds DC01, FS01, WKS01, Wazuh, Kali-adm, and Meta01. DMZ holds Web01. SOC and MGMT are configured but empty, since the planned migration of Wazuh, Meta01, and Kali-adm did not complete.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="560" fill="#ffffff"/>

<rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2C2C2A">Internet (WAN)</text>
<line x1="340" y1="64" x2="340" y2="96" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="240" y="96" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="116" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#042C53">OPNsense firewall</text>
<text x="340" y="132" text-anchor="middle" font-family="Arial" font-size="12" fill="#185FA5">Default-deny ruleset</text>

<line x1="340" y1="140" x2="120" y2="180" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="140" x2="430" y2="180" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="140" x2="560" y2="180" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="140" x2="600" y2="180" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="180" width="290" height="290" rx="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="60" y="206" font-family="Arial" font-size="14" font-weight="bold" fill="#173404">CORP — 10.10.20.0/24</text>
<text x="60" y="222" font-family="Arial" font-size="12" fill="#3B6D11">Users, AD, monitoring, attacker</text>

<rect x="60" y="240" width="240" height="34" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="180" y="261" text-anchor="middle" font-family="Arial" font-size="14" fill="#2C2C2A">DC01 — domain controller</text>
<rect x="60" y="282" width="240" height="34" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="180" y="303" text-anchor="middle" font-family="Arial" font-size="14" fill="#2C2C2A">FS01 — file server</text>
<rect x="60" y="324" width="240" height="34" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="180" y="345" text-anchor="middle" font-family="Arial" font-size="14" fill="#2C2C2A">WKS01 — workstation</text>
<rect x="60" y="366" width="240" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="180" y="387" text-anchor="middle" font-family="Arial" font-size="14" fill="#412402">Wazuh — planned for SOC</text>
<rect x="60" y="408" width="240" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="180" y="429" text-anchor="middle" font-family="Arial" font-size="14" fill="#412402">Kali-adm — planned for MGMT</text>

<rect x="350" y="180" width="160" height="80" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="365" y="206" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">DMZ</text>
<text x="365" y="222" font-family="Arial" font-size="12" fill="#993C1D">10.10.30.0/24</text>
<rect x="365" y="232" width="130" height="20" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="430" y="246" text-anchor="middle" font-family="Arial" font-size="12" fill="#2C2C2A">Web01</text>

<rect x="530" y="180" width="150" height="80" rx="16" fill="#FAEEDA" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3"/>
<text x="545" y="206" font-family="Arial" font-size="14" font-weight="bold" fill="#412402">SOC (empty)</text>

<text x="605" y="246" text-anchor="middle" font-family="Arial" font-size="12" fill="#854F0B">No hosts migrated</text>

<rect x="350" y="280" width="330" height="80" rx="16" fill="#FAEEDA" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3"/>
<text x="365" y="306" font-family="Arial" font-size="14" font-weight="bold" fill="#412402">MGMT (empty)</text>
<text x="365" y="322" font-family="Arial" font-size="12" fill="#854F0B">10.10.10.0/24</text>
<text x="515" y="342" text-anchor="middle" font-family="Arial" font-size="12" fill="#854F0B">No hosts migrated</text>

<rect x="40" y="490" width="600" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="60" y="510" font-family="Arial" font-size="12" fill="#4A1B0C">Meta01 (vulnerable target) currently sits in CORP, not DMZ as planned</text>
<text x="60" y="528" font-family="Arial" font-size="12" fill="#4A1B0C">See "Response to Stage 1 Instructor Feedback" in the Final Project Document</text>
</svg>

<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>NordForge Stage 3 attack path</title>
<desc>From Kali-adm, the attacker scans the network, exploits a Samba vulnerability on Meta01 to get root, then separately performs AS-REP Roasting against an Active Directory test account before hardening, which is shown failing after hardening is applied.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="460" fill="#ffffff"/>

<rect x="250" y="20" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2C2C2A">Kali-adm</text>
<text x="340" y="78" text-anchor="middle" font-family="Arial" font-size="12" fill="#5F5E5A">Nmap scan: 6 hosts discovered</text>
<line x1="340" y1="64" x2="340" y2="96" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="96" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="120" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">Meta01 — Samba</text>
<text x="340" y="138" text-anchor="middle" font-family="Arial" font-size="12" fill="#993C1D">CVE-2007-2447</text>
<line x1="340" y1="152" x2="340" y2="184" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="184" width="180" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="210" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">Root shell obtained</text>

<line x1="340" y1="228" x2="200" y2="270" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="228" x2="480" y2="270" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="110" y="270" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="200" y="294" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#4A1B0C">DVWA web app</text>
<text x="200" y="312" text-anchor="middle" font-family="Arial" font-size="12" fill="#993C1D">SQLi and reflected XSS</text>

<rect x="390" y="270" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="480" y="294" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2C2C2A">DC01 — Active Directory</text>
<text x="480" y="312" text-anchor="middle" font-family="Arial" font-size="12" fill="#5F5E5A">AS-REP Roasting, pre-hardening</text>
<line x1="480" y1="326" x2="480" y2="358" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="390" y="358" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="480" y="382" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#412402">Hash cracked in &lt;1s</text>
<text x="480" y="400" text-anchor="middle" font-family="Arial" font-size="12" fill="#854F0B">Password123!</text>

<rect x="40" y="358" width="320" height="80" rx="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="60" y="382" font-family="Arial" font-size="14" font-weight="bold" fill="#173404">After Stage 2 hardening</text>
<text x="60" y="400" font-family="Arial" font-size="12" fill="#3B6D11">Pre-auth flag removed from all real</text>
<text x="60" y="416" font-family="Arial" font-size="12" fill="#3B6D11">accounts — identical attack fails</text>
</svg>
